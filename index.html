<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IDS 室内设计 · 装修报价系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F2E9;
  --paper2:#EFE9DB;
  --ink:#221E19;
  --navy:#1E2A44;
  --navy2:#152037;
  --brass:#B8763E;
  --brass-dark:#96602F;
  --brass-light:#E8C9A0;
  --line:#D9D0BC;
  --slate:#6E6656;
  --white:#FFFDF9;
  --green:#4C7A5B;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{
  margin:0;padding:0;
  width:100%;
  max-width:100vw;
  overflow-x:hidden; /* 严格禁止左右溢出滚动 */
}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:34px 34px;
  background-position:center top; /* 让底纹背景线也居中对齐 */
}
::selection{background:var(--brass-light);}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}

a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--navy);
  color:var(--white);
  border-bottom:3px solid var(--brass);
  width:100%;
}
.topbar-inner{
  max-width:1200px;
  margin:0 auto;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand-mark{
  width:34px;height:34px;border:2px solid var(--brass);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--brass-light);
  flex:none;
}
.brand-text .t1{font-family:'Fraunces',serif;font-size:19px;font-weight:600;letter-spacing:.2px;}
.brand-text .t2{font-size:11px;color:#B9C2D6;letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.pill-count{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  padding:5px 10px;border-radius:20px;color:#E7DCC8;white-space:nowrap;
}
.btn{
  border:none;border-radius:6px;padding:9px 16px;font-size:13.5px;font-weight:600;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn:active{transform:translateY(1px);}
.btn-brass{background:var(--brass);color:#fff;}
.btn-brass:hover{background:var(--brass-dark);}
.btn-ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.3);}
.btn-ghost:hover{background:rgba(255,255,255,.08);}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--line);}
.btn-outline:hover{border-color:var(--brass);color:var(--brass-dark);}
.btn-sm{padding:6px 11px;font-size:12.5px;}

/* ---------- Layout ---------- */
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:22px 20px 140px;
}
.layout{
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
  width:100%;
}
@media(min-width:980px){
  .layout{
    grid-template-columns:1fr 340px;
    align-items:start;
  }
}

/* client info card */
.card{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px 20px;
}
.card + .card{margin-top:16px;}
.card-title{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:0 0 14px;color:var(--navy);}
.client-card{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px 16px;
}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.field input{
  border:none;border-bottom:1.5px solid var(--line);
  padding:5px 2px 7px;font-size:14.5px;background:transparent;color:var(--ink);
}
.field input:focus{outline:none;border-color:var(--brass);}

/* search + nav */
.toolbar{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:20px 0 14px;
}
.search-box{
  flex:1;min-width:200px;position:relative;
}
.search-box input{
  width:100%;padding:10px 14px 10px 36px;border-radius:8px;border:1px solid var(--line);
  background:var(--white);font-size:14px;
}
.search-box input:focus{outline:none;border-color:var(--brass);}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45;}

.chipnav{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;
  max-width: 100%;
}
.chipnav::-webkit-scrollbar{height:5px;}
.chipnav::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.chip{
  flex:none;font-size:12.5px;padding:6px 12px;border-radius:20px;
  border:1px solid var(--line);background:var(--white);color:var(--slate);
  white-space:nowrap;font-weight:600;
}
.chip.active,.chip:hover{border-color:var(--brass);color:var(--brass-dark);background:#FBF3E8;}
.chip .n{opacity:.6;font-weight:400;margin-left:3px;}

/* category section */
.category{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:10px;
  margin-bottom:14px;
  overflow:hidden;
  scroll-margin-top:120px;
}
.category.hidden{display:none;}
.cat-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;
  background:linear-gradient(180deg,#FBF8F2,#F6F2E9);
  border-bottom:1px solid transparent;
}
.category.open .cat-head{border-bottom-color:var(--line);}
.cat-head-left{display:flex;align-items:baseline;gap:10px;}
.cat-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass);}
.cat-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
.cat-title .en{font-size:12px;color:var(--slate);font-weight:400;font-family:'Inter',sans-serif;margin-left:8px;}
.cat-meta{display:flex;align-items:center;gap:10px;}
.cat-subtotal{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--slate);}
.cat-subtotal.has{color:var(--brass-dark);font-weight:600;}
.chevron{transition:transform .18s ease;color:var(--slate);}
.category.open .chevron{transform:rotate(180deg);}

.cat-body{display:none;}
.category.open .cat-body{display:block;}

.item-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px 14px;
  align-items:center;
  padding:11px 18px;
  border-top:1px solid #F1ECE0;
}
.item-row.hidden{display:none;}
.item-row.qtyset{background:#FCF7EE;}
.item-row:first-child{border-top:none;}
.item-name{font-size:14px;line-height:1.35;}
.item-name .en{display:block;font-size:11.5px;color:var(--slate);font-weight:400;margin-top:2px;}
.item-price{
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--slate);
  text-align:right;white-space:nowrap;
}
.item-price b{color:var(--ink);font-weight:600;}
.qty-control{
  display:flex;align-items:center;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--paper);
}
.qty-control button{
  width:28px;height:30px;border:none;background:transparent;font-size:15px;color:var(--navy);
  display:flex;align-items:center;justify-content:center;
}
.qty-control button:hover{background:var(--brass-light);}
.qty-control input{
  width:46px;border:none;background:transparent;text-align:center;font-family:'IBM Plex Mono',monospace;
  font-size:13.5px;padding:0;-moz-appearance:textfield;
}
.qty-control input::-webkit-outer-spin-button,.qty-control input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.qty-control input:focus{outline:none;}
.line-total{
  font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;color:var(--green);
  min-width:82px;text-align:right;
}
.line-total.zero{color:var(--line);font-weight:400;}

@media(max-width:640px){
  .item-row{grid-template-columns:1fr;grid-template-areas:"name" "controls";row-gap:8px;}
  .item-price{display:none;}
  .item-row .controls-line{display:flex;align-items:center;justify-content:space-between;gap:10px;}
}

/* compact phone mode */
@media(max-width:480px){
  .wrap{padding:12px 8px 128px;}
  .topbar-inner{padding:10px 10px;}
  .brand-mark{width:28px;height:28px;font-size:13px;}
  .brand-text .t1{font-size:15px;}
  .brand-text .t2{font-size:8.5px;}
  .pill-count{font-size:10.5px;padding:4px 7px;}
  .btn-sm{padding:5px 8px;font-size:11px;}

  .card{padding:12px 10px;border-radius:8px;}
  .client-card{grid-template-columns:1fr 1fr;gap:10px 10px;}
  .field label{font-size:9.5px;}
  .field input{font-size:13px;padding:4px 1px 6px;}

  .toolbar{margin:12px 0 9px;gap:7px;}
  .search-box input{padding:8px 10px 8px 30px;font-size:13px;}
  .search-box svg{left:9px;}
  .chip{font-size:11.5px;padding:5px 9px;}
  .chipnav{gap:6px;}

  .category{border-radius:8px;margin-bottom:9px;}
  .cat-head{padding:11px 10px;}
  .cat-num{font-size:10px;}
  .cat-title{font-size:14.5px;}
  .cat-title .en{font-size:10.5px;margin-left:6px;display:block;margin-top:1px;}
  .cat-subtotal{font-size:11.5px;}

  .item-row{padding:9px 10px;}
  .item-name{font-size:13px;}
  .item-name .en{font-size:10px;}
  .qty-control button{width:25px;height:27px;font-size:14px;}
  .qty-control input{width:36px;font-size:12.5px;}
  .line-total{font-size:12.5px;min-width:64px;}

  .footnote{font-size:10.5px;margin-top:16px;}

  .mobar{padding:10px 10px calc(10px + env(safe-area-inset-bottom));}
  .mobar .lbl{font-size:9.5px;}
  .mobar .val{font-size:16.5px;}
  .mobar .btn-sm{padding:6px 8px;font-size:11px;}

  .sheet{padding:15px 10px calc(18px + env(safe-area-inset-bottom));}
  .summary-title{font-size:15.5px;}
  .grand .val{font-size:20px;}
}

/* right summary panel (desktop) */
.summary{
  position:sticky;top:88px;
  width:100%;
}
.summary-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 4px;}
.summary-sub{font-size:12px;color:var(--slate);margin-bottom:14px;}
.summary-list{max-height:260px;overflow-y:auto;margin:10px 0;padding-right:4px;}
.summary-list::-webkit-scrollbar{width:5px;}
.summary-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.summary-row{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
.summary-row .nm{color:var(--ink);}
.summary-row .qy{color:var(--slate);font-family:'IBM Plex Mono',monospace;flex:none;}
.summary-empty{font-size:12.5px;color:var(--slate);padding:18px 0;text-align:center;border:1px dashed var(--line);border-radius:8px;}

.discount-block{margin:14px 0;padding-top:14px;border-top:1px solid var(--line);}
.discount-row{display:flex;gap:8px;align-items:center;}
.seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:none;}
.seg button{padding:7px 10px;border:none;background:var(--white);font-size:12px;color:var(--slate);font-weight:600;}
.seg button.active{background:var(--navy);color:#fff;}
.discount-row input{
  flex:1;border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;
  width:100%;
}
.discount-row input:focus{outline:none;border-color:var(--brass);}

.totals{margin-top:14px;padding-top:14px;border-top:2px solid var(--ink);}
.trow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--slate);}
.trow.discount-amt{color:var(--brass-dark);}
.grand{
  display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;
  padding-top:10px;border-top:1px solid var(--line);
}
.grand .lbl{font-family:'Fraunces',serif;font-size:15px;font-weight:600;}
.grand .val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--brass-dark);}
.grand .val small{font-size:13px;font-weight:500;margin-right:3px;}

.summary-cta{display:flex;flex-direction:column;gap:8px;margin-top:16px;}

/* mobile sticky bar */
.mobar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--navy);color:#fff;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 -4px 18px rgba(0,0,0,.18);
  border-top:3px solid var(--brass);
}
@media(min-width:980px){.mobar{display:none;}}
.mobar .lbl{font-size:10.5px;color:#B9C2D6;text-transform:uppercase;letter-spacing:.09em;}
.mobar .val{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:#F4E3C8;}

@media(min-width:980px){.desktop-summary{display:block;}.mobile-only{display:none;}}
@media(max-width:979px){.desktop-summary{display:none;}}

.footnote{font-size:11.5px;color:var(--slate);text-align:center;margin-top:26px;line-height:1.7;}

/* ---------- sheet (mobile summary drawer) ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(20,16,10,.45);z-index:60;display:none;
}
.sheet-backdrop.show{display:block;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  background:var(--paper);
  border-radius:16px 16px 0 0;
  max-height:82vh;overflow-y:auto;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .25s ease;
}
.sheet.show{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}

/* ---------- print quote view ---------- */
#quoteView{display:none;}
.qv-page{max-width:820px;margin:26px auto;background:#fff;padding:44px 50px;border:1px solid var(--line);}
.qv-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy);padding-bottom:16px;margin-bottom:20px;}
.qv-brand .t1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--navy);}
.qv-brand .t2{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-top:2px;}
.qv-meta{text-align:right;font-size:12px;color:var(--slate);}
.qv-meta b{color:var(--ink);font-family:'IBM Plex Mono',monospace;}
.qv-clientbox{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:13px;margin-bottom:24px;}
.qv-clientbox div span{color:var(--slate);font-size:11px;text-transform:uppercase;letter-spacing:.06em;display:block;}
.qv-cat{margin-top:18px;}
.qv-cat h4{font-family:'Fraunces',serif;font-size:14px;margin:0 0 6px;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:5px;}
table.qv-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.qv-table td{padding:5px 4px;border-bottom:1px solid #F1ECE0;}
table.qv-table td.qty,table.qv-table td.price,table.qv-table td.tot{text-align:right;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.qv-totals{margin-top:22px;margin-left:auto;width:280px;}
.qv-totals .r{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
.qv-totals .grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:8px;font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.qv-terms{margin-top:34px;font-size:10.5px;color:var(--slate);line-height:1.7;border-top:1px solid var(--line);padding-top:12px;}
.qv-actions{max-width:820px;margin:0 auto 20px;padding:0 50px;display:flex;gap:10px;}
.qv-empty{max-width:820px;margin:60px auto;text-align:center;color:var(--slate);font-size:14px;}

@media print{
  body{background:#fff;}
  .topbar,.wrap>*:not(#quoteView),.mobar,.sheet-backdrop,.sheet,.qv-actions{display:none !important;}
  #quoteView{display:block !important;}
  .qv-page{border:none;margin:0;padding:0;}
  .wrap{padding:0;max-width:none;}
}
</style>
</head>
<body>

<!-- ========== TOP BAR ========== -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">ID</div>
      <div class="brand-text">
        <div class="t1">IDS 室内设计</div>
        <div class="t2">Interior · Design · Studio</div>
      </div>
    </div>
    <div class="topbar-actions">
      <span class="pill-count mono" id="pillCount">0 项已选</span>
      <button class="btn btn-ghost btn-sm" id="btnReset">重置</button>
      <button class="btn btn-brass btn-sm" id="btnQuoteTop">生成报价单</button>
    </div>
  </div>
</div>

<!-- ========== MAIN APP VIEW ========== -->
<div class="wrap" id="appView">

  <div class="card">
    <div class="card-title">客户信息 Client Information</div>
    <div class="client-card">
      <div class="field"><label>客户姓名</label><input type="text" id="cName" placeholder="请输入姓名"></div>
      <div class="field"><label>联系电话</label><input type="text" id="cPhone" placeholder="012-3456789"></div>
      <div class="field"><label>项目地址</label><input type="text" id="cAddress" placeholder="装修地点"></div>
      <div class="field"><label>报价日期</label><input type="date" id="cDate"></div>
    </div>
  </div>

  <div class="layout">
    <!-- LEFT: items -->
    <div class="col-main">

      <div class="toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="搜索项目名称…">
        </div>
      </div>
      <div class="chipnav" id="chipNav"></div>

      <div id="categoryList"></div>

      <div class="footnote">
        以上报价仅供参考，实际价格视现场勘察及材料规格而定。<br>
        本报价单有效期为 14 天，超过期限请重新询价确认。
      </div>
    </div>

    <!-- RIGHT: summary (desktop) -->
    <div class="col-side">
      <div class="card summary desktop-summary">
        <div class="summary-title">报价摘要</div>
        <div class="summary-sub">已选项目将实时汇总于此</div>
        <div class="summary-list" id="summaryList"></div>

        <div class="discount-block">
          <div class="field"><label>折扣 Discount</label></div>
          <div class="discount-row" style="margin-top:6px;">
            <div class="seg">
              <button type="button" class="active" data-mode="percent">%</button>
              <button type="button" data-mode="fixed">RM</button>
            </div>
            <input type="number" id="discountInput" min="0" value="0" placeholder="0">
          </div>
        </div>

        <div class="totals">
          <div class="trow"><span>小计 Subtotal</span><span class="mono" id="subtotalVal">RM 0.00</span></div>
          <div class="trow discount-amt"><span>折扣 Discount</span><span class="mono" id="discountVal">- RM 0.00</span></div>
          <div class="grand">
            <span class="lbl">总计 Total</span>
            <span class="val mono"><small>RM</small><span id="grandVal">0.00</span></span>
          </div>
        </div>

        <div class="summary-cta">
          <button class="btn btn-brass" id="btnQuoteSide">生成报价单</button>
          <button class="btn btn-outline" id="btnWa">通过 WhatsApp 发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== MOBILE STICKY BAR ========== -->
<div class="mobar">
  <div>
    <div class="lbl">总计 TOTAL</div>
    <div class="val mono" id="mobarVal">RM 0.00</div>
  </div>
  <button class="btn btn-brass btn-sm" id="btnOpenSheet">查看摘要</button>
</div>

<!-- ========== MOBILE SHEET ========== -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="summary-title">报价摘要</div>
  <div class="summary-sub">已选项目将实时汇总于此</div>
  <div class="summary-list" id="summaryListMobile"></div>

  <div class="discount-block">
    <div class="field"><label>折扣 Discount</label></div>
    <div class="discount-row" style="margin-top:6px;">
      <div class="seg">
        <button type="button" class="active" data-mode="percent">%</button>
        <button type="button" data-mode="fixed">RM</button>
      </div>
      <input type="number" id="discountInputMobile" min="0" value="0" placeholder="0">
    </div>
  </div>

  <div class="totals">
    <div class="trow"><span>小计 Subtotal</span><span class="mono" id="subtotalValMobile">RM 0.00</span></div>
    <div class="trow discount-amt"><span>折扣 Discount</span><span class="mono" id="discountValMobile">- RM 0.00</span></div>
    <div class="grand">
      <span class="lbl">总计 Total</span>
      <span class="val mono"><small>RM</small><span id="grandValMobile">0.00</span></span>
    </div>
  </div>

  <div class="summary-cta">
    <button class="btn btn-brass" id="btnQuoteMobile">生成报价单</button>
    <button class="btn btn-outline" id="btnWaMobile">通过 WhatsApp 发送</button>
    <button class="btn btn-ghost" id="btnCloseSheet" style="color:var(--navy);border:1px solid var(--line);">关闭</button>
  </div>
</div>

<!-- ========== PRINT / QUOTE VIEW ========== -->
<div id="quoteView">
  <div class="qv-actions">
    <button class="btn btn-outline" id="btnBackToApp">&larr; 返回编辑</button>
    <button class="btn btn-brass" id="btnPrint">打印 / 保存为 PDF</button>
  </div>
  <div class="qv-page" id="qvPage"></div>
</div>

        el.scrollIntoView({behavior:"smooth", block:"start"});

    catEl.className = "category" + (idx===0 ? " open" : "");

    head.innerHTML = `

        <span class="cat-subtotal mono" id="catsub-${cat.id}">RM 0.00</span>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>`;
    head.addEventListener("click", ()=> catEl.classList.toggle("open"));

    const body = document.createElement("div");
    body.className = "cat-body";

    cat.items.forEach(it=>{
      const row = document.createElement("div");
      row.className = "item-row";
      row.id = "row-"+it.id;
      row.dataset.name = (it.name + " " + it.nameEn).toLowerCase();
      row.innerHTML = `
        <div class="item-name">${it.name}<span class="en">${it.nameEn}</span></div>
        <div class="item-price mono">${it.unit} <b>RM ${it.price.toFixed(2)}</b></div>
        <div class="controls-line">
          <div class="qty-control">
            <button type="button" data-act="dec" data-id="${it.id}">−</button>
            <input type="number" min="0" value="0" data-id="${it.id}" class="qty-input">
            <button type="button" data-act="inc" data-id="${it.id}">+</button>
          </div>
          <div class="line-total zero mono" id="linetotal-${it.id}">RM 0.00</div>
        </div>`;
      body.appendChild(row);
    });

    catEl.appendChild(head);
    catEl.appendChild(body);
    categoryList.appendChild(catEl);
  });

  categoryList.addEventListener("click", e=>{
    const btn = e.target.closest("button[data-act]");
    if(!btn) return;
    const id = btn.dataset.id;
    const input = categoryList.querySelector(`.qty-input[data-id="${id}"]`);
    let val = parseInt(input.value)||0;
    val = btn.dataset.act === "inc" ? val+1 : Math.max(0, val-1);
    input.value = val;
    setQty(id, val);
  });

  categoryList.addEventListener("input", e=>{
    if(!e.target.classList.contains("qty-input")) return;
    const id = e.target.dataset.id;
    let val = parseInt(e.target.value)||0;
    if(val < 0) val = 0;
    setQty(id, val);
  });
}

/* ================== 数量与计算逻辑 ================== */
function setQty(id, qty){
  state.qty[id] = qty;
  const row = document.getElementById("row-"+id);
  const lt = document.getElementById("linetotal-"+id);
  const price = itemIndex[id].price;
  const total = price*qty;
  lt.textContent = "RM " + total.toFixed(2);
  lt.classList.toggle("zero", qty===0);
  row.classList.toggle("qtyset", qty>0);
  updateAll();
}

function getSelectedItems(){
  return Object.entries(state.qty)
    .filter(([id,q])=>q>0)
    .map(([id,q])=>({ ...itemIndex[id], id, qty:q, lineTotal: itemIndex[id].price*q }));
}

function computeTotals(){
  const selected = getSelectedItems();
  const subtotal = selected.reduce((s,it)=>s+it.lineTotal,0);
  let discountAmt = 0;
  if(state.discountMode === "percent"){
    discountAmt = subtotal * (Math.min(state.discountValue,100)/100);
  } else {
    discountAmt = Math.min(state.discountValue, subtotal);
  }
  const grand = Math.max(0, subtotal - discountAmt);
  return { selected, subtotal, discountAmt, grand };
}

function fmt(n){ return "RM " + n.toFixed(2); }

function updateAll(){
  const { selected, subtotal, discountAmt, grand } = computeTotals();

  // category subtotals
  CATEGORIES.forEach(cat=>{
    const sum = cat.items.reduce((s,it)=> s + (state.qty[it.id]||0)*it.price, 0);
    const el = document.getElementById("catsub-"+cat.id);
    el.textContent = fmt(sum);
    el.classList.toggle("has", sum>0);
  });

  // pill count
  const count = selected.reduce((s,it)=>s+it.qty,0);
  document.getElementById("pillCount").textContent = count + " 项已选";

  // summary lists (desktop + mobile)
  [document.getElementById("summaryList"), document.getElementById("summaryListMobile")].forEach(list=>{
    list.innerHTML = "";
    if(selected.length===0){
      list.innerHTML = `<div class="summary-empty">尚未选择任何项目<br>点击左侧项目旁的数量按钮开始添加</div>`;
      return;
    }
    selected.forEach(it=>{
      const row = document.createElement("div");
      row.className = "summary-row";
      row.innerHTML = `<span class="nm">${it.name} <span style="color:var(--slate);font-weight:400;">${it.nameEn}</span></span><span class="qy mono">×${it.qty} · ${fmt(it.lineTotal)}</span>`;
      list.appendChild(row);
    });
  });

  // totals (desktop + mobile)
  document.getElementById("subtotalVal").textContent = fmt(subtotal);
  document.getElementById("subtotalValMobile").textContent = fmt(subtotal);
  document.getElementById("discountVal").textContent = "- " + fmt(discountAmt);
  document.getElementById("discountValMobile").textContent = "- " + fmt(discountAmt);
  document.getElementById("grandVal").textContent = grand.toFixed(2);
  document.getElementById("grandValMobile").textContent = grand.toFixed(2);
  document.getElementById("mobarVal").textContent = fmt(grand);
}

/* ================== 折扣控件 ================== */
function wireDiscountControls(segSelector, inputEl){
  const seg = document.querySelector(segSelector);
  seg.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      seg.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      state.discountMode = btn.dataset.mode;
      syncDiscountInputs();
      updateAll();
    });
  });
  inputEl.addEventListener("input", ()=>{
    state.discountValue = parseFloat(inputEl.value)||0;
    syncDiscountInputs();
    updateAll();
  });
}
function syncDiscountInputs(){
  document.getElementById("discountInput").value = state.discountValue;
  document.getElementById("discountInputMobile").value = state.discountValue;
  document.querySelectorAll(".seg button").forEach(b=>{
    b.classList.toggle("active", b.dataset.mode===state.discountMode);
  });
}

/* ================== 搜索 ================== */
document.getElementById("searchInput").addEventListener("input", e=>{
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".category").forEach(catEl=>{
    let visibleCount = 0;
    catEl.querySelectorAll(".item-row").forEach(row=>{
      const match = !q || row.dataset.name.includes(q);
      row.classList.toggle("hidden", !match);
      if(match) visibleCount++;
    });
    catEl.classList.toggle("hidden", visibleCount===0);
    if(q && visibleCount>0) catEl.classList.add("open");
  });
});

const sheetBackdrop = document.getElementById("sheetBackdrop");

function closeSheet(){ sheet.classList.remove("show"); sheetBackdrop.classList.remove("show"); }

/* ================== 重置 ================== */
document.getElementById("btnReset").addEventListener("click", ()=>{
  if(!confirm("确定要清空所有已选项目及客户信息吗？")) return;
  state.qty = {};
  state.discountValue = 0;
  syncDiscountInputs();
  document.querySelectorAll(".qty-input").forEach(inp=>inp.value=0);
  document.querySelectorAll(".line-total").forEach(el=>{ el.textContent="RM 0.00"; el.classList.add("zero"); });
  document.querySelectorAll(".item-row").forEach(el=>el.classList.remove("qtyset"));
  ["cName","cPhone","cAddress","cDate"].forEach(id=>document.getElementById(id).value="");
  updateAll();
});

  const grouped = CATEGORIES.map(cat=>{

  return `

        <div class="t2">${COMPANY.sub}</div>

    ${catsHTML}
    <div class="qv-totals">
      <div class="r"><span>小计 Subtotal</span><span class="mono">${fmt(subtotal)}</span></div>
      <div class="r"><span>折扣 Discount</span><span class="mono">- ${fmt(discountAmt)}</span></div>

    <div class="qv-terms">
      1. 本报价单有效期为 14 天，超过期限请重新询价确认。<br>
      2. 实际用料规格、颜色及施工细节以现场勘察及双方确认为准。<br>
      3. 报价不包含现场未列明之隐蔽工程，如有变更将另行报价。<br>
      4. 联系电话：${COMPANY.phone}
    </div>`;
}

function showQuote(){
  qvPage.innerHTML = buildQuoteHTML();
  appView.style.display = "none";
  quoteView.style.display = "block";
  closeSheet();
  window.scrollTo(0,0);
}
function backToApp(){
  quoteView.style.display = "none";
  appView.style.display = "block";
}

document.getElementById("btnQuoteTop").addEventListener("click", showQuote);
document.getElementById("btnQuoteSide").addEventListener("click", showQuote);
document.getElementById("btnQuoteMobile").addEventListener("click", showQuote);
document.getElementById("btnBackToApp").addEventListener("click", backToApp);
document.getElementById("btnPrint").addEventListener("click", ()=>window.print());

/* ================== WhatsApp 发送摘要 ================== */
function buildWaText(){
  const { selected, subtotal, discountAmt, grand } = computeTotals();
  const cName = document.getElementById("cName").value || "客户";
  if(selected.length===0) return null;
  let lines = [`*${COMPANY.name} 装修报价摘要*`, `客户：${cName}`, ""];
  selected.forEach(it=> lines.push(`• ${it.name} (${it.nameEn}) ×${it.qty} — ${fmt(it.lineTotal)}`));
  lines.push("");
  lines.push(`小计：${fmt(subtotal)}`);
  lines.push(`折扣：- ${fmt(discountAmt)}`);
  lines.push(`*总计：${fmt(grand)}*`);
  return lines.join("\n");
}
function sendWhatsApp(){
  const text = buildWaText();
  if(!text){ alert("请先选择至少一个项目再发送。"); return; }
  const url = `https://wa.me/${COMPANY.waNumber}?text=${encodeURIComponent(text)}`;
  window.open(url, "_blank");
}
document.getElementById("btnWa").addEventListener("click", sendWhatsApp);
document.getElementById("btnWaMobile").addEventListener("click", sendWhatsApp);

wireDiscountControls(".sheet .seg", document.getElementById("discountInputMobile"));
document.getElementById("cDate").value = new Date().toISOString().slice(0,10);
updateAll();
