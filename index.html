<style>
:root{
  --paper:#F6F2E9;
  --paper2:#EFE9DB;
  --ink:#221E19;
  --navy:#1E2A44;
  --navy2:#152037;
  --brass:#B8763E;
  --brass-dark:#96602F;
  --brass-light:#E8C9A0;
  --line:#D9D0BC;
  --slate:#6E6656;
  --white:#FFFDF9;
  --green:#4C7A5B;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{
  margin:0;padding:0;
  width:100%;
  max-width:100vw;
  overflow-x:hidden; /* 严格禁止左右溢出滚动 */
}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:34px 34px;
  background-position:center top; /* 让底纹背景线也居中对齐 */
}
::selection{background:var(--brass-light);}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}

a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--navy);
  color:var(--white);
  border-bottom:3px solid var(--brass);
  width:100%;
}
.topbar-inner{
  max-width:1200px; /* 统一下方内容区域最大宽度 */
  margin:0 auto;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand-mark{
  width:34px;height:34px;border:2px solid var(--brass);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--brass-light);
  flex:none;
}
.brand-text .t1{font-family:'Fraunces',serif;font-size:19px;font-weight:600;letter-spacing:.2px;}
.brand-text .t2{font-size:11px;color:#B9C2D6;letter-spacing:.12em;text-transform:uppercase;margin-top:1px;}
.topbar-actions{display:flex;gap:10px;align-items:center;}
.pill-count{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  padding:5px 10px;border-radius:20px;color:#E7DCC8;white-space:nowrap;
}
.btn{
  border:none;border-radius:6px;padding:9px 16px;font-size:13.5px;font-weight:600;
  transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn:active{transform:translateY(1px);}
.btn-brass{background:var(--brass);color:#fff;}
.btn-brass:hover{background:var(--brass-dark);}
.btn-ghost{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.3);}
.btn-ghost:hover{background:rgba(255,255,255,.08);}
.btn-outline{background:transparent;color:var(--navy);border:1px solid var(--line);}
.btn-outline:hover{border-color:var(--brass);color:var(--brass-dark);}
.btn-sm{padding:6px 11px;font-size:12.5px;}

/* ---------- Layout ---------- */
.wrap{
  max-width:1200px; /* 适配大屏的最佳舒适宽度 */
  margin:0 auto; /* 核心居中代码 */
  padding:22px 20px 140px;
}
.layout{
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
  width:100%;
}
@media(min-width:980px){
  .layout{
    grid-template-columns:1fr 340px; /* 完美分栏：左侧自适应，右侧摘要固定宽度 */
    align-items:start;
  }
}

/* client info card */
.card{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:10px;
  padding:18px 20px;
}
.card + .card{margin-top:16px;}
.client-card{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px 16px;
}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--slate);text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.field input{
  border:none;border-bottom:1.5px solid var(--line);
  padding:5px 2px 7px;font-size:14.5px;background:transparent;color:var(--ink);
}
.field input:focus{outline:none;border-color:var(--brass);}

/* search + nav */
.toolbar{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:20px 0 14px;
}
.search-box{
  flex:1;min-width:200px;position:relative;
}
.search-box input{
  width:100%;padding:10px 14px 10px 36px;border-radius:8px;border:1px solid var(--line);
  background:var(--white);font-size:14px;
}
.search-box input:focus{outline:none;border-color:var(--brass);}
.search-box svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45;}

.chipnav{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;
  max-width: 100%;
}
.chipnav::-webkit-scrollbar{height:5px;}
.chipnav::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.chip{
  flex:none;font-size:12.5px;padding:6px 12px;border-radius:20px;
  border:1px solid var(--line);background:var(--white);color:var(--slate);
  white-space:nowrap;font-weight:600;
}
.chip.active,.chip:hover{border-color:var(--brass);color:var(--brass-dark);background:#FBF3E8;}
.chip .n{opacity:.6;font-weight:400;margin-left:3px;}

/* category section */
.category{
  background:var(--white);
  border:1px solid var(--line);
  border-radius:10px;
  margin-bottom:14px;
  overflow:hidden;
  scroll-margin-top:120px;
}
.cat-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;
  background:linear-gradient(180deg,#FBF8F2,#F6F2E9);
  border-bottom:1px solid transparent;
}
.category.open .cat-head{border-bottom-color:var(--line);}
.cat-head-left{display:flex;align-items:baseline;gap:10px;}
.cat-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass);}
.cat-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
.cat-title .en{font-size:12px;color:var(--slate);font-weight:400;font-family:'Inter',sans-serif;margin-left:8px;}
.cat-meta{display:flex;align-items:center;gap:10px;}
.cat-subtotal{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--slate);}
.cat-subtotal.has{color:var(--brass-dark);font-weight:600;}
.chevron{transition:transform .18s ease;color:var(--slate);}
.category.open .chevron{transform:rotate(180deg);}

.cat-body{display:none;}
.category.open .cat-body{display:block;}

.item-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px 14px;
  align-items:center;
  padding:11px 18px;
  border-top:1px solid #F1ECE0;
}
.item-row.qtyset{background:#FCF7EE;}
.item-row:first-child{border-top:none;}
.item-name{font-size:14px;line-height:1.35;}
.item-price{
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--slate);
  text-align:right;white-space:nowrap;
}
.item-price b{color:var(--ink);font-weight:600;}
.qty-control{
  display:flex;align-items:center;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--paper);
}
.qty-control button{
  width:28px;height:30px;border:none;background:transparent;font-size:15px;color:var(--navy);
  display:flex;align-items:center;justify-content:center;
}
.qty-control button:hover{background:var(--brass-light);}
.qty-control input{
  width:46px;border:none;background:transparent;text-align:center;font-family:'IBM Plex Mono',monospace;
  font-size:13.5px;padding:0;-moz-appearance:textfield;
}
.qty-control input::-webkit-outer-spin-button,.qty-control input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.qty-control input:focus{outline:none;}
.line-total{
  font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:600;color:var(--green);
  min-width:82px;text-align:right;
}
.line-total.zero{color:var(--line);font-weight:400;}

@media(max-width:640px){
  .item-row{grid-template-columns:1fr;grid-template-areas:"name" "controls";row-gap:8px;}
  .item-price{display:none;}
  .item-row .controls-line{display:flex;align-items:center;justify-content:space-between;gap:10px;}
}

/* compact phone mode */
@media(max-width:480px){
  .wrap{padding:12px 8px 128px;}
  .topbar-inner{padding:10px 10px;}
  .brand-mark{width:28px;height:28px;font-size:13px;}
  .brand-text .t1{font-size:15px;}
  .brand-text .t2{font-size:8.5px;}
  .pill-count{font-size:10.5px;padding:4px 7px;}
  .btn-sm{padding:5px 8px;font-size:11px;}

  .card{padding:12px 10px;border-radius:8px;}
  .client-card{grid-template-columns:1fr 1fr;gap:10px 10px;}
  .field label{font-size:9.5px;}
  .field input{font-size:13px;padding:4px 1px 6px;}

  .toolbar{margin:12px 0 9px;gap:7px;}
  .search-box input{padding:8px 10px 8px 30px;font-size:13px;}
  .search-box svg{left:9px;}
  .chip{font-size:11.5px;padding:5px 9px;}
  .chipnav{gap:6px;}

  .category{border-radius:8px;margin-bottom:9px;}
  .cat-head{padding:11px 10px;}
  .cat-num{font-size:10px;}
  .cat-title{font-size:14.5px;}
  .cat-title .en{font-size:10.5px;margin-left:6px;display:block;margin-top:1px;}
  .cat-subtotal{font-size:11.5px;}

  .item-row{padding:9px 10px;}
  .item-name{font-size:13px;}
  .qty-control button{width:25px;height:27px;font-size:14px;}
  .qty-control input{width:36px;font-size:12.5px;}
  .line-total{font-size:12.5px;min-width:64px;}

  .footnote{font-size:10.5px;margin-top:16px;}

  .mobar{padding:10px 10px calc(10px + env(safe-area-inset-bottom));}
  .mobar .lbl{font-size:9.5px;}
  .mobar .val{font-size:16.5px;}
  .mobar .btn-sm{padding:6px 8px;font-size:11px;}

  .sheet{padding:15px 10px calc(18px + env(safe-area-inset-bottom));}
  .summary-title{font-size:15.5px;}
  .grand .val{font-size:20px;}
}

/* right summary panel (desktop) */
.summary{
  position:sticky;top:88px;
  width:100%;
}
.summary-title{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 4px;}
.summary-sub{font-size:12px;color:var(--slate);margin-bottom:14px;}
.summary-list{max-height:260px;overflow-y:auto;margin:10px 0;padding-right:4px;}
.summary-list::-webkit-scrollbar{width:5px;}
.summary-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.summary-row{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
.summary-row .nm{color:var(--ink);}
.summary-row .qy{color:var(--slate);font-family:'IBM Plex Mono',monospace;flex:none;}
.summary-empty{font-size:12.5px;color:var(--slate);padding:18px 0;text-align:center;border:1px dashed var(--line);border-radius:8px;}

.discount-block{margin:14px 0;padding-top:14px;border-top:1px solid var(--line);}
.discount-row{display:flex;gap:8px;align-items:center;}
.seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;flex:none;}
.seg button{padding:7px 10px;border:none;background:var(--white);font-size:12px;color:var(--slate);font-weight:600;}
.seg button.active{background:var(--navy);color:#fff;}
.discount-row input{
  flex:1;border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;
  width:100%;
}
.discount-row input:focus{outline:none;border-color:var(--brass);}

.totals{margin-top:14px;padding-top:14px;border-top:2px solid var(--ink);}
.trow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--slate);}
.trow.discount-amt{color:var(--brass-dark);}
.grand{
  display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;
  padding-top:10px;border-top:1px solid var(--line);
}
.grand .lbl{font-family:'Fraunces',serif;font-size:15px;font-weight:600;}
.grand .val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--brass-dark);}
.grand .val small{font-size:13px;font-weight:500;margin-right:3px;}

.summary-cta{display:flex;flex-direction:column;gap:8px;margin-top:16px;}

/* mobile sticky bar */
.mobar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--navy);color:#fff;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 -4px 18px rgba(0,0,0,.18);
  border-top:3px solid var(--brass);
}
@media(min-width:980px){.mobar{display:none;}}
.mobar .lbl{font-size:10.5px;color:#B9C2D6;text-transform:uppercase;letter-spacing:.09em;}
.mobar .val{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:#F4E3C8;}

@media(min-width:980px){.desktop-summary{display:block;}.mobile-only{display:none;}}
@media(max-width:979px){.desktop-summary{display:none;}}

.footnote{font-size:11.5px;color:var(--slate);text-align:center;margin-top:26px;line-height:1.7;}

/* ---------- sheet (mobile summary drawer) ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(20,16,10,.45);z-index:60;display:none;
}
.sheet-backdrop.show{display:block;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  background:var(--paper);
  border-radius:16px 16px 0 0;
  max-height:82vh;overflow-y:auto;
  padding:18px 18px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .25s ease;
}
.sheet.show{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}

/* ---------- print quote view ---------- */
#quoteView{display:none;}
.qv-page{max-width:820px;margin:26px auto;background:#fff;padding:44px 50px;border:1px solid var(--line);}
.qv-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy);padding-bottom:16px;margin-bottom:20px;}
.qv-brand .t1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--navy);}
.qv-brand .t2{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);margin-top:2px;}
.qv-meta{text-align:right;font-size:12px;color:var(--slate);}
.qv-meta b{color:var(--ink);font-family:'IBM Plex Mono',monospace;}
.qv-clientbox{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;font-size:13px;margin-bottom:24px;}
.qv-clientbox div span{color:var(--slate);font-size:11px;text-transform:uppercase;letter-spacing:.06em;display:block;}
.qv-cat{margin-top:18px;}
.qv-cat h4{font-family:'Fraunces',serif;font-size:14px;margin:0 0 6px;color:var(--navy);border-bottom:1px solid var(--line);padding-bottom:5px;}
table.qv-table{width:100%;border-collapse:collapse;font-size:12.5px;}
table.qv-table td{padding:5px 4px;border-bottom:1px solid #F1ECE0;}
table.qv-table td.qty,table.qv-table td.price,table.qv-table td.tot{text-align:right;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.qv-totals{margin-top:22px;margin-left:auto;width:280px;}
.qv-totals .r{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
.qv-totals .grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:8px;font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.qv-terms{margin-top:34px;font-size:10.5px;color:var(--slate);line-height:1.7;border-top:1px solid var(--line);padding-top:12px;}
.qv-actions{max-width:820px;margin:0 auto 20px;padding:0 50px;display:flex;gap:10px;}

@media print{
  body{background:#fff;}
  .topbar,.wrap>*:not(#quoteView),.mobar,.sheet-backdrop,.sheet,.qv-actions{display:none !important;}
  #quoteView{display:block !important;}
  .qv-page{border:none;margin:0;padding:0;}
  .wrap{padding:0;max-width:none;}
}
</style>
